<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Emma · LinkedIn Outreach Monitor</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0c0e1a; --s1:#131520; --s2:#1a1d2e; --s3:#21253a;
  --bd:#252840; --bd2:#2e3250;
  --text:#e4e8f5; --text2:#7f8aaa; --text3:#464f6e;
  --blue:#4f7cf7; --blue2:#3b65e0; --blue-bg:#0f1d45;
  --green:#22c55e; --red:#ef4444; --yellow:#f59e0b;
  --font:'Inter',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:var(--font);background:var(--bg);color:var(--text);height:100vh;overflow:hidden;display:flex}
button{font-family:var(--font);cursor:pointer;border:none;outline:none}
input,textarea{font-family:var(--font)}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:var(--bd2);border-radius:2px}

/* NAV SIDEBAR */
#nav-sidebar{width:56px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;align-items:center;padding:12px 0;gap:4px;flex-shrink:0}
.nav-logo{width:36px;height:36px;background:var(--blue);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:#fff;margin-bottom:8px}
.nav-item{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;transition:background .15s,color .15s;font-size:18px}
.nav-item:hover,.nav-item.active{background:var(--s3);color:var(--text)}
.nav-spacer{flex:1}
.nav-sync{width:36px;height:36px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:var(--text2);cursor:pointer;background:var(--s2);border:1px solid var(--bd);font-size:14px;transition:all .15s}
.nav-sync:hover{background:var(--s3);color:var(--blue)}

/* INBOX PANEL */
#inbox-panel{width:260px;background:var(--s1);border-right:1px solid var(--bd);display:flex;flex-direction:column;flex-shrink:0}
.inbox-header{padding:16px 12px 12px;border-bottom:1px solid var(--bd)}
.inbox-title{font-size:13px;font-weight:600;color:var(--text);letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px;display:flex;align-items:center;justify-content:space-between}
.inbox-search{position:relative}
.inbox-search input{width:100%;background:var(--s2);border:1px solid var(--bd);border-radius:8px;padding:7px 10px 7px 30px;font-size:12px;color:var(--text);outline:none}
.inbox-search input::placeholder{color:var(--text3)}
.inbox-search input:focus{border-color:var(--blue)}
.inbox-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text3);font-size:12px}
.inbox-filters{display:flex;gap:6px;padding:10px 12px;border-bottom:1px solid var(--bd);flex-wrap:wrap}
.filter-pill{font-size:11px;padding:4px 10px;border-radius:20px;background:var(--s2);color:var(--text2);cursor:pointer;border:1px solid var(--bd);transition:all .15s}
.filter-pill.active,.filter-pill:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.inbox-list{flex:1;overflow-y:auto;padding:6px 0}
.inbox-enrich-row{padding:8px 12px;border-bottom:1px solid var(--bd)}
.inbox-enrich-btn{width:100%;padding:7px;background:var(--s2);border:1px solid var(--bd);border-radius:8px;color:var(--text2);font-size:11px;cursor:pointer;transition:all .15s}
.inbox-enrich-btn:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.conv-row{padding:10px 12px;cursor:pointer;border-bottom:1px solid var(--bd);transition:background .1s;display:flex;gap:10px;align-items:flex-start}
.conv-row:hover{background:var(--s2)}
.conv-row.active{background:var(--s3);border-left:2px solid var(--blue)}
.conv-avatar{width:34px;height:34px;border-radius:50%;background:var(--s3);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:600;color:var(--blue);flex-shrink:0;position:relative}
.conv-dot{position:absolute;bottom:0;right:0;width:9px;height:9px;border-radius:50%;background:var(--green);border:2px solid var(--s1)}
.conv-dot.yellow{background:var(--yellow)}
.conv-dot.red{background:var(--red)}
.conv-meta{flex:1;min-width:0}
.conv-name{font-size:12px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.conv-snippet{font-size:11px;color:var(--text2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:1px}
.conv-time{font-size:10px;color:var(--text3);margin-top:1px}

/* THREAD PANEL */
#thread-panel{flex:1;display:flex;flex-direction:column;min-width:0}
.thread-header{padding:14px 18px;border-bottom:1px solid var(--bd);background:var(--s1);display:flex;align-items:center;gap:12px}
.thread-avatar{width:36px;height:36px;border-radius:50%;background:var(--s2);display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:600;color:var(--blue)}
.thread-name{font-size:14px;font-weight:600;color:var(--text)}
.thread-sub{font-size:11px;color:var(--text2)}
.thread-chips{margin-left:auto;display:flex;gap:6px;align-items:center}
.chip{display:inline-flex;align-items:center;gap:4px;padding:3px 8px;border-radius:20px;font-size:10px;font-weight:600;letter-spacing:.3px}
.chip-blocker{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
.chip-advance{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.chip-hold{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.chip-recovery{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.chip-turn{background:var(--s2);color:var(--text2);border:1px solid var(--bd);font-size:10px;padding:3px 7px;border-radius:20px}
.thread-messages{flex:1;overflow-y:auto;padding:18px;display:flex;flex-direction:column;gap:12px;background:var(--bg)}
.msg{display:flex;flex-direction:column;max-width:72%}
.msg.emma{align-self:flex-end;align-items:flex-end}
.msg.prospect{align-self:flex-start;align-items:flex-start}
.msg-label{font-size:10px;color:var(--text3);margin-bottom:3px}
.msg-bubble{padding:10px 13px;border-radius:12px;font-size:13px;line-height:1.55}
.msg.emma .msg-bubble{background:var(--blue);color:#fff;border-radius:12px 12px 4px 12px}
.msg.prospect .msg-bubble{background:var(--s2);color:var(--text);border:1px solid var(--bd);border-radius:12px 12px 12px 4px}
.msg-time{font-size:10px;color:var(--text3);margin-top:3px}
.thread-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--text3);font-size:13px}

/* COMPOSE */
#compose-area{border-top:1px solid var(--bd);background:var(--s1);padding:14px 18px}
.compose-tones{display:flex;gap:6px;margin-bottom:10px}
.tone-btn{padding:5px 10px;border-radius:20px;font-size:11px;background:var(--s2);color:var(--text2);border:1px solid var(--bd);cursor:pointer;transition:all .15s}
.tone-btn.active,.tone-btn:hover{background:var(--blue-bg);color:var(--blue);border-color:var(--blue)}
.compose-box{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:10px 12px;margin-bottom:10px;min-height:64px}
.compose-box textarea{width:100%;background:transparent;border:none;outline:none;color:var(--text);font-size:13px;line-height:1.5;resize:none;min-height:44px}
.compose-box textarea::placeholder{color:var(--text3)}
.compose-actions{display:flex;gap:8px;align-items:center}
.compose-btn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;cursor:pointer;transition:all .15s}
.btn-ki{background:var(--blue-bg);color:var(--blue);border:1px solid var(--blue)}
.btn-ki:hover{background:var(--blue);color:#fff}
.btn-copy{background:var(--s2);color:var(--text2);border:1px solid var(--bd)}
.btn-copy:hover{background:var(--s3);color:var(--text)}
.btn-send{background:var(--blue);color:#fff;border:1px solid var(--blue);margin-left:auto}
.btn-send:hover{background:var(--blue2)}
.btn-send:disabled{opacity:.5;cursor:not-allowed}

/* RIGHT PANEL */
#right-panel{width:280px;background:var(--s1);border-left:1px solid var(--bd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0}
.right-section{border-bottom:1px solid var(--bd);padding:14px}
.section-title{font-size:10px;font-weight:600;color:var(--text3);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px}
.profile-name{font-size:15px;font-weight:700;color:var(--text);margin-bottom:2px}
.profile-role{font-size:12px;color:var(--text2);margin-bottom:8px}
.profile-badges{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:8px}
.skill-tag{padding:3px 8px;border-radius:20px;font-size:10px;background:var(--s2);color:var(--text2);border:1px solid var(--bd)}
.analyze-btn{width:100%;padding:8px;background:var(--blue);color:#fff;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:background .15s}
.analyze-btn:hover{background:var(--blue2)}

/* 7-LAYER AMPEL */
.layer-row{display:flex;align-items:center;gap:8px;margin-bottom:7px}
.layer-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.layer-label{font-size:11px;color:var(--text2);width:82px;flex-shrink:0}
.layer-label.blocker{color:var(--red);font-weight:600}
.layer-bar-wrap{flex:1;height:4px;background:var(--bd);border-radius:2px;overflow:hidden}
.layer-bar{height:100%;border-radius:2px;transition:width .4s}
.layer-score{font-size:10px;color:var(--text2);width:24px;text-align:right;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-yellow{background:var(--yellow)}
.dot-red{background:var(--red)}
.bar-green{background:var(--green)}
.bar-yellow{background:var(--yellow)}
.bar-red{background:var(--red)}

/* STATE CLUSTERS */
.cluster-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600;margin-bottom:6px}
.cluster-s0{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.cluster-s1{background:rgba(245,158,11,.15);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.cluster-s2{background:rgba(251,146,60,.15);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.cluster-s3{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.cluster-s4{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.cluster-s5{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}

/* PAIN POINTS */
.pain-list{display:flex;flex-direction:column;gap:5px}
.pain-item{display:flex;align-items:flex-start;gap:7px;font-size:11px;color:var(--text2);line-height:1.4}
.pain-icon{color:var(--red);font-size:10px;margin-top:1px;flex-shrink:0}

/* INTERVENTION */
.intervention-chip{display:inline-flex;align-items:center;padding:4px 10px;border-radius:20px;font-size:11px;font-weight:600}
.int-MIRROR{background:rgba(148,163,184,.12);color:#94a3b8;border:1px solid rgba(148,163,184,.25)}
.int-SAFETY{background:rgba(239,68,68,.12);color:#ef4444;border:1px solid rgba(239,68,68,.25)}
.int-TRUST_BUILD{background:rgba(245,158,11,.12);color:#f59e0b;border:1px solid rgba(245,158,11,.25)}
.int-CLARIFY,.int-STRUCTURE{background:rgba(96,165,250,.12);color:#60a5fa;border:1px solid rgba(96,165,250,.25)}
.int-REFRAME{background:rgba(167,139,250,.12);color:#a78bfa;border:1px solid rgba(167,139,250,.25)}
.int-ACTIVATE{background:rgba(251,146,60,.12);color:#fb923c;border:1px solid rgba(251,146,60,.25)}
.int-ROUTE{background:rgba(34,197,94,.12);color:#22c55e;border:1px solid rgba(34,197,94,.25)}
.int-REDUCE{background:rgba(148,163,184,.12);color:#94a3b8;border:1px solid rgba(148,163,184,.25)}
.int-PARK{background:rgba(100,116,139,.12);color:#64748b;border:1px solid rgba(100,116,139,.25)}

/* PLACEHOLDER STATES */
.right-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:24px;color:var(--text3)}
.right-placeholder .icon{font-size:32px;margin-bottom:4px}
.right-placeholder p{font-size:12px;text-align:center;line-height:1.5}

/* TOAST */
#toast{position:fixed;bottom:24px;right:24px;padding:10px 16px;border-radius:8px;font-size:12px;font-weight:500;display:none;z-index:999;backdrop-filter:blur(8px)}
#toast.ok{background:rgba(34,197,94,.15);color:#22c55e;border:1px solid rgba(34,197,94,.3)}
#toast.err{background:rgba(239,68,68,.15);color:#ef4444;border:1px solid rgba(239,68,68,.3)}
#toast.sending{background:rgba(79,124,247,.15);color:var(--blue);border:1px solid rgba(79,124,247,.3)}
</style>
</head>
<body>

<!-- NAV SIDEBAR -->
<div id="nav-sidebar">
  <div class="nav-logo">E</div>
  <div class="nav-item active" title="Inbox">💬</div>
  <div class="nav-item" title="Contacts">👤</div>
  <div class="nav-item" title="Campaigns">📊</div>
  <div class="nav-spacer"></div>
  <div class="nav-sync" id="sync-btn" title="Sync Inbox" onclick="triggerSync()">↻</div>
</div>

<!-- INBOX PANEL -->
<div id="inbox-panel">
  <div class="inbox-header">
    <div class="inbox-title">
      Inbox
      <span id="inbox-count" style="font-size:10px;font-weight:400;color:var(--text3)">–</span>
    </div>
    <div class="inbox-search">
      <span class="inbox-search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Suchen…" oninput="filterContacts()">
    </div>
  </div>
  <div class="inbox-filters">
    <div class="filter-pill active" data-filter="all" onclick="setFilter(this,'all')">Alle</div>
    <div class="filter-pill" data-filter="active" onclick="setFilter(this,'active')">Aktiv</div>
    <div class="filter-pill" data-filter="recovery" onclick="setFilter(this,'recovery')">Recovery</div>
    <div class="filter-pill" data-filter="hold" onclick="setFilter(this,'hold')">Hold</div>
  </div>
  <div class="inbox-enrich-row">
    <button class="inbox-enrich-btn" onclick="enrichContacts()">⬆ Alle Kontakte anreichern</button>
  </div>
  <div class="inbox-list" id="inbox-list">
    <div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Lade Kontakte…</div>
  </div>
</div>

<!-- THREAD PANEL -->
<div id="thread-panel">
  <div class="thread-header" id="thread-header">
    <div style="color:var(--text3);font-size:13px">← Kontakt auswählen</div>
  </div>
  <div class="thread-messages" id="thread-messages">
    <div class="thread-empty">Kein Kontakt ausgewählt</div>
  </div>
  <div id="compose-area" style="display:none">
    <div class="compose-tones" id="tone-btns">
      <button class="tone-btn active" data-tone="Professionell">Professionell</button>
      <button class="tone-btn" data-tone="Freundlich">Freundlich</button>
      <button class="tone-btn" data-tone="Direkt">Direkt</button>
      <button class="tone-btn" data-tone="Consultativ">Consultativ</button>
    </div>
    <div class="compose-box">
      <textarea id="compose-text" placeholder="Antwort verfassen oder KI-Antwort generieren…" rows="3"></textarea>
    </div>
    <div class="compose-actions">
      <button class="compose-btn btn-ki" onclick="generateReply()">✦ KI-Antwort</button>
      <button class="compose-btn btn-copy" onclick="copyReply()">Kopieren</button>
      <button class="compose-btn btn-send" id="send-btn" onclick="sendMessage()">Senden →</button>
    </div>
  </div>
</div>

<!-- RIGHT PANEL -->
<div id="right-panel">
  <div class="right-placeholder" id="right-placeholder">
    <div class="icon">📊</div>
    <p>Wähle einen Kontakt um die Emma-Analyse zu sehen</p>
  </div>
</div>

<div id="toast"></div>

<script>
let contacts = [];
let filteredContacts = [];
let selectedId = null;
let activeFilter = 'all';
let activeTone = 'Professionell';

// ── Init ──────────────────────────────────────────────────────────────────────
async function init() {
  await loadContacts();
}

// ── Load contacts ─────────────────────────────────────────────────────────────
async function loadContacts() {
  try {
    const r = await fetch('/api/contacts');
    const data = await r.json();
    // API returns array directly
    contacts = Array.isArray(data) ? data : (data.contacts || []);
    document.getElementById('inbox-count').textContent = contacts.length;
    applyFilter();
  } catch(e) {
    document.getElementById('inbox-list').innerHTML =
      '<div style="padding:20px;text-align:center;color:var(--red);font-size:12px">Fehler beim Laden</div>';
  }
}

// ── Filter ────────────────────────────────────────────────────────────────────
function setFilter(el, filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  el.classList.add('active');
  applyFilter();
}

function filterContacts() {
  applyFilter();
}

function applyFilter() {
  const q = (document.getElementById('search-input').value || '').toLowerCase();
  filteredContacts = contacts.filter(c => {
    const name = (c.linkedin_name || '').toLowerCase();
    if (q && !name.includes(q)) return false;
    if (activeFilter === 'active') return (c.flow_mode || 'HOLD') === 'ADVANCE';
    if (activeFilter === 'recovery') return (c.flow_mode || '') === 'RECOVERY';
    if (activeFilter === 'hold') return (c.flow_mode || 'HOLD') === 'HOLD';
    return true;
  });
  renderContactList();
}

// ── Render contact list ───────────────────────────────────────────────────────
function renderContactList() {
  const el = document.getElementById('inbox-list');
  if (!filteredContacts.length) {
    el.innerHTML = '<div style="padding:20px;text-align:center;color:var(--text3);font-size:12px">Keine Kontakte</div>';
    return;
  }
  el.innerHTML = filteredContacts.map(c => {
    const initials = (c.linkedin_name || '?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
    const trust = (c.state && c.state.trust_score != null) ? c.state.trust_score : 5;
    const dotClass = trust >= 6.5 ? '' : trust >= 4 ? 'yellow' : 'red';
    const snippet = c.last_message ? c.last_message.slice(0,42) + (c.last_message.length > 42 ? '…' : '') : '–';
    const isActive = c.id === selectedId;
    const time = c.last_message_at ? new Date(c.last_message_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '';
    return `<div class="conv-row${isActive?' active':''}" onclick="selectContact('${c.id}')">
      <div class="conv-avatar">${initials}<span class="conv-dot ${dotClass}"></span></div>
      <div class="conv-meta">
        <div class="conv-name">${c.linkedin_name || 'Unbekannt'}</div>
        <div class="conv-snippet">${snippet}</div>
        <div class="conv-time">${time}</div>
      </div>
    </div>`;
  }).join('');
}

// ── Select contact ────────────────────────────────────────────────────────────
async function selectContact(id) {
  selectedId = id;
  renderContactList();
  const contact = contacts.find(c => c.id === id);
  if (!contact) return;
  renderThreadHeader(contact);
  renderRightPanel(contact, null);
  document.getElementById('compose-area').style.display = 'block';
  await loadMessages(id);
  await loadAnalysis(id);
}

function renderThreadHeader(contact) {
  const initials = (contact.linkedin_name || '?').split(' ').map(w=>w[0]).join('').slice(0,2).toUpperCase();
  const blocker = contact.blocker || (contact.state && contact.state.current_blocker) || '–';
  const flow = contact.flow_mode || (contact.state && contact.state.flow_mode) || 'HOLD';
  const turn = contact.turn_count || 0;
  const flowCls = flow === 'ADVANCE' ? 'chip-advance' : flow === 'RECOVERY' ? 'chip-recovery' : 'chip-hold';
  document.getElementById('thread-header').innerHTML = `
    <div class="thread-avatar">${initials}</div>
    <div>
      <div class="thread-name">${contact.linkedin_name || 'Unbekannt'}</div>
      <div class="thread-sub">${contact.company_name || ''}</div>
    </div>
    <div class="thread-chips">
      <span class="chip chip-blocker">⚠ ${blocker}</span>
      <span class="chip ${flowCls}">${flow}</span>
      <span class="chip chip-turn">Turn ${turn}</span>
    </div>`;
}

// ── Load messages ─────────────────────────────────────────────────────────────
async function loadMessages(contactId) {
  try {
    const r = await fetch(`/api/contacts/${contactId}/messages`);
    const data = await r.json();
    // API returns array directly
    renderMessages(Array.isArray(data) ? data : (data.messages || []));
  } catch(e) {
    document.getElementById('thread-messages').innerHTML =
      '<div class="thread-empty">Fehler beim Laden</div>';
  }
}

function renderMessages(messages) {
  const el = document.getElementById('thread-messages');
  if (!messages.length) {
    el.innerHTML = '<div class="thread-empty">Noch keine Nachrichten</div>';
    return;
  }
  el.innerHTML = messages.map(m => {
    // Support both {direction:'outgoing'} (DB) and {role:'assistant'} (OpenAI) shapes
    const isEmma = m.direction === 'outgoing' || m.role === 'assistant';
    const cls = isEmma ? 'emma' : 'prospect';
    const label = isEmma ? 'Emma' : 'Prospect';
    const time = m.created_at ? new Date(m.created_at).toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'}) : '';
    const body = m.text || m.content || '';
    return `<div class="msg ${cls}">
      <div class="msg-label">${label}</div>
      <div class="msg-bubble">${escHtml(body)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

// ── Load analysis ─────────────────────────────────────────────────────────────
async function loadAnalysis(contactId) {
  try {
    const r = await fetch(`/api/contacts/${contactId}/state`);
    const data = await r.json();
    const contact = contacts.find(c => c.id === contactId);
    // Normalize field names from emma_state row
    const analysis = {
      pain_points: data.pain_points || [],
      state_cluster: data.state_cluster || null,
      summary: data.prospect_summary || '',
    };
    renderRightPanel(contact, analysis);
  } catch(e) { /* show basic profile without analysis */ }
}

// ── Render right panel ────────────────────────────────────────────────────────
function renderRightPanel(contact, analysis) {
  const el = document.getElementById('right-panel');
  if (!contact) {
    el.innerHTML = `<div class="right-placeholder" id="right-placeholder">
      <div class="icon">📊</div><p>Wähle einen Kontakt um die Emma-Analyse zu sehen</p></div>`;
    return;
  }

  const st = contact.state || {};
  const scores = {
    state: st.state_score ?? 5,
    clarity: st.clarity_score ?? 5,
    ease: st.ease_score ?? 5,
    trust: st.trust_score ?? 5,
    momentum: st.momentum_score ?? 5,
    authority: st.authority_score ?? 5,
  };
  const blocker = contact.blocker || st.current_blocker || '';
  const intervention = st.current_intervention || 'MIRROR';

  // Pain points
  let painHtml = '<div class="pain-list">';
  const painPoints = (analysis && analysis.pain_points) || contact.pain_points || [];
  if (painPoints.length) {
    painHtml += painPoints.map(p => `<div class="pain-item"><span class="pain-icon">●</span>${escHtml(p)}</div>`).join('');
  } else {
    painHtml += '<div style="font-size:11px;color:var(--text3)">Noch keine Pain Points erkannt</div>';
  }
  painHtml += '</div>';

  // State cluster
  const cluster = (analysis && analysis.state_cluster) || contact.state_cluster || null;
  const clusterMap = {S0:'cluster-s0',S1:'cluster-s1',S2:'cluster-s2',S3:'cluster-s3',S4:'cluster-s4',S5:'cluster-s5'};
  const clusterLabel = {S0:'S0 · Abwehr',S1:'S1 · Skepsis',S2:'S2 · Interesse',S3:'S3 · Bewegung',S4:'S4 · Commitment',S5:'S5 · Partnerschaft'};
  const clusterHtml = cluster
    ? `<div class="cluster-chip ${clusterMap[cluster]||'cluster-s1'}">◎ ${clusterLabel[cluster]||cluster}</div>`
    : '';

  // Summary
  const summaryHtml = (analysis && analysis.summary)
    ? `<div style="font-size:11px;color:var(--text2);line-height:1.55">${escHtml(analysis.summary)}</div>`
    : '';

  el.innerHTML = `
    <!-- Profile -->
    <div class="right-section">
      <div class="section-title">Profil</div>
      <div class="profile-name">${escHtml(contact.linkedin_name || 'Unbekannt')}</div>
      <div class="profile-role">${escHtml(contact.job_title || contact.title || '')}${contact.company_name ? ' · ' + escHtml(contact.company_name) : ''}</div>
      <div class="profile-badges">
        <span class="skill-tag">BANT</span>
        <span class="skill-tag">ICP</span>
        <span class="skill-tag">Qualify</span>
        <span class="skill-tag">Outreach</span>
        <span class="skill-tag">Objections</span>
      </div>
      <button class="analyze-btn" onclick="analyzeContact()">Jetzt analysieren</button>
    </div>

    <!-- 7-Layer Ampel -->
    <div class="right-section">
      <div class="section-title">7 Schichten</div>
      ${renderLayer('Zustand', scores.state, blocker==='STATE')}
      ${renderLayer('Klarheit', scores.clarity, blocker==='CLARITY')}
      ${renderLayer('Leichtigkeit', scores.ease, blocker==='EASE')}
      ${renderLayer('Vertrauen', scores.trust, blocker==='TRUST')}
      ${renderLayer('Momentum', scores.momentum, blocker==='MOMENTUM')}
      ${renderLayer('Entscheidung', scores.authority, blocker==='AUTHORITY')}
    </div>

    <!-- State & Intervention -->
    <div class="right-section">
      <div class="section-title">Zustandscluster</div>
      ${clusterHtml || '<div style="font-size:11px;color:var(--text3)">Noch nicht analysiert</div>'}
      ${summaryHtml}
      <div style="margin-top:8px">
        <div style="font-size:10px;color:var(--text3);margin-bottom:5px">AKTIVE INTERVENTION</div>
        <span class="intervention-chip int-${intervention}">${intervention}</span>
      </div>
    </div>

    <!-- Pain Points -->
    <div class="right-section">
      <div class="section-title">Pain Points</div>
      ${painHtml}
    </div>
  `;
}

function renderLayer(label, score, isBlocker) {
  const s = Math.max(0, Math.min(10, score));
  const dotCls = s >= 6.5 ? 'dot-green' : s >= 4 ? 'dot-yellow' : 'dot-red';
  const barCls = s >= 6.5 ? 'bar-green' : s >= 4 ? 'bar-yellow' : 'bar-red';
  const labelCls = isBlocker ? 'layer-label blocker' : 'layer-label';
  const blockIcon = isBlocker ? ' ⚠' : '';
  return `<div class="layer-row">
    <div class="layer-dot ${dotCls}"></div>
    <div class="${labelCls}">${label}${blockIcon}</div>
    <div class="layer-bar-wrap"><div class="layer-bar ${barCls}" style="width:${s*10}%"></div></div>
    <div class="layer-score">${s.toFixed(1)}</div>
  </div>`;
}

// ── Analyze contact ───────────────────────────────────────────────────────────
async function analyzeContact() {
  if (!selectedId) return;
  showToast('sending', 'Analysiere…');
  try {
    const r = await fetch(`/api/contacts/${selectedId}/analyze`, {method:'POST'});
    const data = await r.json();
    const contact = contacts.find(c => c.id === selectedId);
    renderRightPanel(contact, data);
    showToast('ok', 'Analyse abgeschlossen');
  } catch(e) {
    showToast('err', 'Analyse fehlgeschlagen');
  }
}

// ── Generate KI reply ─────────────────────────────────────────────────────────
async function generateReply() {
  if (!selectedId) return;
  showToast('sending', 'Generiere Antwort…');
  try {
    const r = await fetch(`/api/contacts/${selectedId}/suggest`);
    const data = await r.json();
    document.getElementById('compose-text').value = data.reply || '';
    showToast('ok', 'KI-Antwort generiert');
  } catch(e) {
    showToast('err', 'Fehler beim Generieren');
  }
}

// ── Send message ──────────────────────────────────────────────────────────────
async function sendMessage() {
  if (!selectedId) return;
  const text = document.getElementById('compose-text').value.trim();
  if (!text) return;
  const btn = document.getElementById('send-btn');
  btn.disabled = true;
  showToast('sending', 'Sende via Dripify…');
  try {
    const r = await fetch(`/api/contacts/${selectedId}/send`, {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({text}),
    });
    if (!r.ok) throw new Error(await r.text());
    document.getElementById('compose-text').value = '';
    showToast('ok', 'Nachricht gesendet via LinkedIn');
    // Optimistic bubble
    const el = document.getElementById('thread-messages');
    const time = new Date().toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
    el.innerHTML += `<div class="msg emma">
      <div class="msg-label">Emma</div>
      <div class="msg-bubble">${escHtml(text)}</div>
      <div class="msg-time">${time}</div>
    </div>`;
    el.scrollTop = el.scrollHeight;
  } catch(e) {
    showToast('err', 'Senden fehlgeschlagen: ' + e.message);
  } finally {
    btn.disabled = false;
  }
}

// ── Copy reply ────────────────────────────────────────────────────────────────
function copyReply() {
  const text = document.getElementById('compose-text').value;
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => showToast('ok', 'Kopiert'));
}

// ── Enrich contacts ───────────────────────────────────────────────────────────
async function enrichContacts() {
  showToast('sending', 'Anreichern läuft…');
  try {
    const r = await fetch('/api/enrich', {method:'POST'});
    const data = await r.json();
    showToast('ok', data.status === 'started' ? 'Anreicherung gestartet…' : `${data.updated || 0} Kontakte angereichert`);
    await loadContacts();
  } catch(e) {
    showToast('err', 'Anreichern fehlgeschlagen');
  }
}

// ── Sync ──────────────────────────────────────────────────────────────────────
async function triggerSync() {
  const btn = document.getElementById('sync-btn');
  btn.style.color = 'var(--blue)';
  showToast('sending', 'Sync läuft…');
  try {
    const r = await fetch('/api/sync', {method:'POST'});
    const data = await r.json();
    showToast('ok', data.message || 'Sync abgeschlossen');
    await loadContacts();
  } catch(e) {
    showToast('err', 'Sync fehlgeschlagen');
  } finally {
    btn.style.color = '';
  }
}

// ── Tone buttons ──────────────────────────────────────────────────────────────
document.querySelectorAll('.tone-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    activeTone = btn.dataset.tone;
    document.querySelectorAll('.tone-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  });
});

// ── Utils ─────────────────────────────────────────────────────────────────────
function showToast(cls, msg) {
  const t = document.getElementById('toast');
  t.className = cls;
  t.textContent = msg;
  t.style.display = 'block';
  clearTimeout(t._to);
  t._to = setTimeout(() => { t.style.display = 'none'; }, 3500);
}

function escHtml(s) {
  if (!s) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

init();
</script>

</html>
